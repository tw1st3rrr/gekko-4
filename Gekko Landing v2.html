<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ГЕККО АРТ — Конструктор нового поколения</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&amp;family=Unbounded:wght@500;600;700;800;900&amp;family=Tektur:wght@600;700;800&amp;family=Russo+One&amp;family=Rubik+Mono+One&amp;display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' }
</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --accent: #276152;
    --ink: #0D3A35;
    --paper: #FBF6F0;
    --sage: #B1B7AB;
    --font-display: 'Unbounded', sans-serif;
    --font-body: 'Golos Text', sans-serif;
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
  }
  .dark body { background: #07201C; }

  .font-display { font-family: var(--font-display); }
  .font-hero {
    font-family: var(--font-hero, var(--font-display));
    font-weight: var(--font-hero-weight, 800);
  }

  /* accent token utilities */
  .text-accent   { color: var(--accent) !important; }
  .bg-accent     { background-color: var(--accent) !important; }
  .border-accent { border-color: var(--accent) !important; }
  .hover-accent-dark:hover { background-color: color-mix(in oklab, var(--accent), black 14%) !important; }
  .fill-accent   { fill: var(--accent) !important; }

  /* carousel progress */
  @keyframes slideProgress { from { width: 0% } to { width: 100% } }

  /* starfield twinkle */
  @keyframes twinkle { 0%, 100% { opacity: 0 } 50% { opacity: 1 } }
  .star { animation: twinkle var(--dur, 3s) ease-in-out var(--delay, 0s) infinite; }

  /* scroll reveal — visible by default; JS adds .pre-reveal only when IO is live */
  [data-reveal] {
    transition: opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1);
  }
  [data-reveal].pre-reveal {
    opacity: 0;
    transform: translateY(26px);
  }
  @media (prefers-reduced-motion: reduce) {
    [data-reveal].pre-reveal { opacity: 1; transform: none; transition: none; }
  }

  /* staggered char hover (catalog titles) */
  .st-ch { position: relative; display: inline-block; overflow: hidden; vertical-align: top; }
  .st-a, .st-b {
    display: inline-block;
    transition: transform .3s cubic-bezier(.25,.46,.45,.94);
    transition-delay: var(--d, 0ms);
  }
  .st-a { opacity: .22; }
  .st-b { position: absolute; left: 0; top: 0; transform: translateY(110%); }
  .stagger-text.is-active .st-a { transform: translateY(-110%); }
  .stagger-text.is-active .st-b { transform: translateY(0); }

  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }

  .logo-img { height: 2rem; width: auto; }
  .dark .logo-img { filter: invert(1) hue-rotate(180deg); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/hero.jsx"></script>
<script type="text/babel" src="app/sections.jsx"></script>
<script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
