<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:30px 26px;background:var(--bg-page);font-family:var(--gk-font-body);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .b{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--r-full);white-space:nowrap;line-height:1}
  .solid{background:var(--accent);color:#fff}
  .soft{background:color-mix(in oklab,var(--accent) 12%,transparent);color:var(--accent)}
  .outline{background:transparent;color:var(--text-body);border:1px solid var(--border-subtle)}
  .stars{display:inline-flex;gap:2px;color:#F59E0B;font-size:16px}
  .rating{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--text-strong)}
</style></head><body>
  <span class="b solid">★ Популярный выбор</span>
  <span class="b soft">Новинка</span>
  <span class="b outline">1/4</span>
  <span class="rating"><span class="stars">★★★★★</span>5.0</span>
</body></html>
