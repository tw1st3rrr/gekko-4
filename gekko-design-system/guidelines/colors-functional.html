<!-- @dsCard group="Colors" viewport="700x150" subtitle="Sparingly: ratings, contact tiles, status" name="Functional accents" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-page);display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;display:flex;align-items:center;gap:11px;font-family:var(--gk-font-body)}
  .dot{width:38px;height:38px;border-radius:var(--r-md);flex:none}
  .nm{font-size:13px;font-weight:700;color:var(--text-strong)}
  .hx{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="sw"><div class="dot" style="background:#F59E0B"></div><div><div class="nm">Amber</div><div class="hx">#F59E0B · stars</div></div></div>
  <div class="sw"><div class="dot" style="background:#16A34A"></div><div><div class="nm">Success</div><div class="hx">#16A34A · sent</div></div></div>
  <div class="sw"><div class="dot" style="background:#2563EB"></div><div><div class="nm">Info</div><div class="hx">#2563EB · email</div></div></div>
  <div class="sw"><div class="dot" style="background:#F97316"></div><div><div class="nm">Warn</div><div class="hx">#F97316 · hours</div></div></div>
</body></html>
