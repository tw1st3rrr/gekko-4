<!-- @dsCard group="Spacing" viewport="700x190" subtitle="4px base rhythm" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--gk-font-body)}
  .row{display:flex;align-items:center;gap:14px;padding:4px 0}
  .bar{height:14px;background:color-mix(in oklab,var(--accent) 80%,transparent);border-radius:3px}
  .nm{width:46px;font-size:12px;font-weight:700;color:var(--text-strong)}
  .px{font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="row"><span class="nm">2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="nm">4</span><div class="bar" style="width:16px"></div><span class="px">16px · gutter</span></div>
  <div class="row"><span class="nm">6</span><div class="bar" style="width:24px"></div><span class="px">24px · card padding</span></div>
  <div class="row"><span class="nm">10</span><div class="bar" style="width:40px"></div><span class="px">40px · desktop gutter</span></div>
  <div class="row"><span class="nm">20</span><div class="bar" style="width:80px"></div><span class="px">80px · section-y</span></div>
  <div class="row"><span class="nm">28</span><div class="bar" style="width:112px"></div><span class="px">112px · section-y-lg</span></div>
</body></html>
