<!-- @dsCard group="Brand" viewport="700x200" subtitle="The pixel-cluster mark & wordmark" name="Brand mark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 26px;background:var(--bg-page);display:flex;gap:46px;align-items:center;flex-wrap:wrap}
  .lockup{display:inline-flex;align-items:center;gap:10px}
  .word{font-family:var(--gk-font-display);font-weight:800;letter-spacing:-.02em;color:var(--text-strong);font-size:30px}
  .stack{display:flex;flex-direction:column;gap:3px}
  .r{display:flex;gap:3px}
  .p{width:11px;height:11px;background:var(--accent);display:block}
  .o5{opacity:.5}
  .cap{font-family:var(--gk-font-body);font-size:12px;color:var(--text-muted);margin-top:12px}
</style></head><body>
  <div>
    <div class="lockup">
      <span class="stack">
        <span class="r"><i class="p"></i><i class="p o5"></i></span>
        <span class="r"><i class="p o5"></i><i class="p"></i></span>
      </span>
      <span class="word">ГЕККО</span>
    </div>
    <div class="cap">2×2 cluster — the construction "pixel"</div>
  </div>
  <div>
    <div class="lockup" style="gap:14px">
      <span class="stack" style="gap:6px"><span class="r" style="gap:6px"><i class="p" style="width:22px;height:22px"></i><i class="p o5" style="width:22px;height:22px"></i></span><span class="r" style="gap:6px"><i class="p o5" style="width:22px;height:22px"></i><i class="p" style="width:22px;height:22px"></i></span></span>
    </div>
    <div class="cap">Mark, standalone</div>
  </div>
</body></html>
