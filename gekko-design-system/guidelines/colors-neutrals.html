<!-- @dsCard group="Colors" viewport="700x180" subtitle="Warm paper, cream & sage" name="Neutrals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-page);display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:130px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:78px}
  .meta{padding:10px 12px;font-family:var(--gk-font-body);background:var(--bg-surface)}
  .nm{font-size:13px;font-weight:700;color:var(--text-strong)}
  .hx{font-size:12px;color:var(--text-muted);margin-top:2px;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="sw"><div class="chip" style="background:#FBF6F0"></div><div class="meta"><div class="nm">Paper (bg)</div><div class="hx">#FBF6F0</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="nm">White (surface)</div><div class="hx">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#ECEFE9"></div><div class="meta"><div class="nm">Cream (on dark)</div><div class="hx">#ECEFE9</div></div></div>
  <div class="sw"><div class="chip" style="background:#B1B7AB"></div><div class="meta"><div class="nm">Sage</div><div class="hx">#B1B7AB</div></div></div>
</body></html>
