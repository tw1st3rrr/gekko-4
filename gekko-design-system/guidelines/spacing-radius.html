<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Soft, consistent corners" name="Radius scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page);display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;font-family:var(--gk-font-body)}
  .col{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:74px;height:60px;background:var(--accent);opacity:.92}
  .nm{font-size:12px;font-weight:700;color:var(--text-strong)}
  .px{font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="col"><div class="box" style="border-radius:var(--r-sm)"></div><div class="nm">sm</div><div class="px">8px · chips</div></div>
  <div class="col"><div class="box" style="border-radius:var(--r-md)"></div><div class="nm">md</div><div class="px">12px · buttons</div></div>
  <div class="col"><div class="box" style="border-radius:var(--r-lg)"></div><div class="nm">lg</div><div class="px">16px · cards</div></div>
  <div class="col"><div class="box" style="border-radius:var(--r-xl)"></div><div class="nm">xl</div><div class="px">24px · media</div></div>
  <div class="col"><div class="box" style="border-radius:var(--r-full);width:60px"></div><div class="nm">full</div><div class="px">pills</div></div>
</body></html>
