<!-- @dsCard group="Type" viewport="700x300" subtitle="From eyebrow to price numeral" name="Type scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page)}
  .row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-subtle)}
  .row:last-child{border:0}
  .tag{font-family:var(--gk-font-body);font-size:11px;color:var(--text-muted);width:84px;flex:none;font-variant-numeric:tabular-nums}
  .d{font-family:var(--gk-font-display);font-weight:800;letter-spacing:-.02em;color:var(--text-strong)}
  .b{font-family:var(--gk-font-body);color:var(--text-strong)}
</style></head><body>
  <div class="row"><span class="tag">48 / black</span><span class="d" style="font-weight:900;font-size:36px">8 990 ₽</span></div>
  <div class="row"><span class="tag">36 · 4xl</span><span class="d" style="font-size:32px">Частые вопросы</span></div>
  <div class="row"><span class="tag">24 · 2xl</span><span class="d" style="font-size:24px">Напишите нам!</span></div>
  <div class="row"><span class="tag">18 · lg</span><span class="b" style="font-size:18px;font-weight:700">Загрузи фото</span></div>
  <div class="row"><span class="tag">16 · base</span><span class="b" style="font-size:16px">Доставка по всей России</span></div>
  <div class="row"><span class="tag">14 · sm</span><span class="b" style="font-size:14px;color:var(--text-body)">Все наборы включают платы и схему</span></div>
  <div class="row"><span class="tag">12 · label</span><span class="b" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.22em;color:var(--accent)">стоимость</span></div>
</body></html>
