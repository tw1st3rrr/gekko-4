<!-- @dsCard group="Colors" viewport="700x180" subtitle="Primary accent + pine tones" name="Brand greens" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-page);display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:78px}
  .meta{padding:10px 12px;font-family:var(--gk-font-body);background:var(--bg-surface)}
  .nm{font-size:13px;font-weight:700;color:var(--text-strong)}
  .hx{font-size:12px;color:var(--text-muted);margin-top:2px;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="sw"><div class="chip" style="background:#276152"></div><div class="meta"><div class="nm">Green / accent</div><div class="hx">#276152</div></div></div>
  <div class="sw"><div class="chip" style="background:#3E7D6B"></div><div class="meta"><div class="nm">Green soft</div><div class="hx">#3E7D6B</div></div></div>
  <div class="sw"><div class="chip" style="background:#0D3A35"></div><div class="meta"><div class="nm">Ink / pine</div><div class="hx">#0D3A35</div></div></div>
  <div class="sw"><div class="chip" style="background:#0B302B"></div><div class="meta"><div class="nm">Pine 600</div><div class="hx">#0B302B</div></div></div>
  <div class="sw"><div class="chip" style="background:#07201C"></div><div class="meta"><div class="nm">Pine 900</div><div class="hx">#07201C</div></div></div>
</body></html>
