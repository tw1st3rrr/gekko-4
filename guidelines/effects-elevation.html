<!-- @dsCard group="Spacing" viewport="700x190" subtitle="Soft neutral elevation + glass" name="Elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 24px;background:var(--bg-page);display:flex;gap:26px;flex-wrap:wrap;align-items:center;font-family:var(--gk-font-body)}
  .col{display:flex;flex-direction:column;align-items:center;gap:11px}
  .box{width:96px;height:64px;background:var(--bg-surface);border-radius:var(--r-lg);border:1px solid var(--border-subtle)}
  .nm{font-size:12px;font-weight:700;color:var(--text-strong)}
</style></head><body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="nm">xl · hover</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-2xl)"></div><div class="nm">2xl · media</div></div>
</body></html>
